name: GCP root

on:
    workflow_call:
        inputs:
            kommando:
                required: true
                type: string
            bucket:
                required: true
                type: string
        secrets:
            GCS_SA_KEY:
                required: true

env:
    PRINT_PAYLOAD: true
    TZ: Europe/Amsterdam
    CI: true

jobs:
    deploy:
        name: Deploy application to GCP-bucket
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - name: Install bun
              uses: oven-sh/setup-bun@v1
            - name: Install dependencies (bun)
              run: bun install
            - name: Run tests
              run: npm run test
            - name: Build application
              run: ${{ inputs.kommando }}
            - name: Upload to CDN
              uses: navikt/frontend/actions/cdn-upload/v1@main
              with:
                cdn-team-name: dab
                source: ./build/
                destination: /${{ inputs.bucket }}/
                no-cache-paths: ${{ inputs.bucket }}/build/index.html
